<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bouncing Box</title>
    <script src="jquery.min.js"></script>
    <style>
      .box {
        width: 70px;
        height: 70px;
        background-color: teal;
        font-size: 300%;
        text-align: center;
        user-select: none;
        display: block;
        position: absolute;
        top: 100px;
        /* Change me! */
        left: 0px;
      }

      .board {
        height: 100vh;
      }
    </style>
    <!-- 	<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script> -->
  </head>

  <body class="board">
    <!-- HTML for the box -->
    <div class="box">?</div>

    <script>
      (function () {
        "use strict";
        /* global jQuery */

        //////////////////////////////////////////////////////////////////
        /////////////////// SETUP DO NOT DELETE //////////////////////////
        //////////////////////////////////////////////////////////////////

        var box = jQuery(".box"); // reference to the HTML .box element
        var board = jQuery(".board"); // reference to the HTML .board element
        var boardWidth = board.width(); // the maximum X-Coordinate of the screen
        var boardHeight = board.height(); // the maximum Y-Coordinate of the screen

        // update the boardWidth variable when the window is resized
        jQuery(window).on("resize", function () {
          boardWidth = board.width();
          boardHeight = board.height();
        });

        // Every 50 milliseconds, call the update Function (see below)
        setInterval(update, 50);

        // Every time the box is clicked, call the handleBoxClick Function (see below)
        box.on("click", handleBoxClick);

        // moves the Box to a new position on the screen along the X and Y axes
        function moveBoxTo(newPositionX, newPositionY) {
          box.css("left", newPositionX);
          box.css("top", newPositionY);
        }

        // changes the text displayed on the Box
        function changeBoxText(newText) {
          box.text(newText);
        }

        //////////////////////////////////////////////////////////////////
        /////////////////// YOUR CODE BELOW HERE /////////////////////////
        //////////////////////////////////////////////////////////////////

        // TODO 2 - Variable declarations
        var boxPositionX = 0;
        var boxPositionY = 0;
        var boxSpeed = 10;
        var boxSpeedY = 10;
        var clickCount = 0;

        /**
         * This Function will be called 20 times/second.
         * Each time it is called, it should move the Box to a new location.
         * If the box drifts off the screen, turn it around!
         */
        function update() {
          // Update position by adding speed
          boxPositionX = boxPositionX + boxSpeed;
          boxPositionY = boxPositionY + boxSpeedY;

          // Check if box hits the right edge
          if (boxPositionX >= boardWidth - 70) {
            boxSpeed = boxSpeed * -1;
          }

          // Check if box hits the left edge
          if (boxPositionX <= 0) {
            boxSpeed = boxSpeed * -1;
          }

          // Check if box hits the bottom edge
          if (boxPositionY >= boardHeight - 70) {
            boxSpeedY = boxSpeedY * -1;
          }

          // Check if box hits the top edge
          if (boxPositionY <= 0) {
            boxSpeedY = boxSpeedY * -1;
          }

          // Move the box to the new position
          moveBoxTo(boxPositionX, boxPositionY);
        }

        /**
         * This Function will be called each time the box is clicked.
         * Each time it is called, it should perform each of the following actions:
         * - increase the points total
         * - increase the speed
         * - move the box to the left side of the screen.
         */
        function handleBoxClick() {
          clickCount = clickCount + 1;
          changeBoxText(clickCount);
        }
      })();
    </script>
  </body>
</html>
